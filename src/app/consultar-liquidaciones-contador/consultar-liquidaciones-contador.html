<div class="dashboard">
    <input type="date" [(ngModel)]="fechaDeInicio">
    <input type="date" [(ngModel)]="fechaDeFin">
    <button>Buscar</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>TRANSPORTISTA</th>
                <th>FORMA DE PAGO</th>
                <th>ESTADO</th>
                <th>VALOR FLETE</th>
                <th>TOTAL</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Mauricio</td>
                <td>contra entrega</td>
                <td>liquidado</td>
                <td>15.000</td>
                <td>456.900</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Manuel</td>
                <td>contra entrega</td>
                <td>en cobro</td>
                <td>20.000</td>
                <td>342.900</td>
            </tr>
            <tr *ngFor="let liquidacion of liquidaciones">
                <td>{{ liquidacion.id }}</td>
                <td>{{ liquidacion.formaDePago }}</td>
                <td>{{ liquidacion.estado }}</td>
                <td>{{ liquidacion.fechaDeCreacion }}</td>
                <td>{{ liquidacion.total }}</td>
            </tr>
        </tbody>
    </table>
</div>
